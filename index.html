<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Spotter Lite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: rotate(20deg);
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        body.dark-mode .input-section {
            background: rgba(30, 35, 60, 0.7);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .input-section:hover {
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.15);
        }

        #textInput {
            width: 100%;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            background: white;
            color: #2c3e50;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        body.dark-mode #textInput {
            background: #1a1a2e;
            border-color: #333;
            color: #e0e0e0;
        }

        #textInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        #analyzeBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #analyzeBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #analyzeBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #clearBtn {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 2px solid #667eea;
        }

        body.dark-mode #clearBtn {
            background: rgba(102, 126, 234, 0.15);
        }

        #clearBtn:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .results-container {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease;
        }

        body.dark-mode .card {
            background: rgba(30, 35, 60, 0.8);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 48px rgba(102, 126, 234, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .card-content {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #667eea;
            transition: all 0.3s ease;
        }

        body.dark-mode .word-tag {
            color: #a0aef0;
        }

        .word-tag:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: scale(1.05);
        }

        .card.themes {
            border-left: 4px solid #667eea;
        }

        .card.phrases {
            border-left: 4px solid #764ba2;
        }

        .card.tone-shift {
            border-left: 4px solid #f093fb;
        }

        .card.summary {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.05));
            border: 2px solid rgba(102, 126, 234, 0.2);
        }

        body.dark-mode .card.summary {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.1));
        }

        .no-results {
            text-align: center;
            padding: 60px 30px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        body.dark-mode .no-results {
            background: rgba(30, 35, 60, 0.7);
            border-color: rgba(102, 126, 234, 0.2);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .no-results p {
            font-size: 16px;
            opacity: 0.7;
            margin: 0;
        }

        .loading {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 640px) {
            header {
                margin-bottom: 30px;
            }

            .logo {
                font-size: 24px;
            }

            .input-section {
                padding: 20px;
            }

            #textInput {
                height: 150px;
                font-size: 14px;
            }

            button {
                font-size: 14px;
                padding: 10px 18px;
            }

            .results {
                grid-template-columns: 1fr;
            }

            .card.summary {
                grid-column: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">✨ Pattern Spotter Lite</div>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
                <span id="themeIcon">🌙</span>
            </button>
        </header>

        <div class="subtitle">Discover hidden patterns in your writing</div>

        <div class="input-section">
            <textarea
                id="textInput"
                placeholder="Paste your text here... A journal entry, essay, thoughts, anything. We'll find the hidden patterns."></textarea>

            <div class="button-group">
                <button id="analyzeBtn" type="button">Find Patterns</button>
                <button id="clearBtn" type="button">Clear</button>
            </div>
        </div>

        <div class="results-container" id="resultsContainer"></div>
    </div>

    <<script src="script.js"></script>
</body>
</html>
