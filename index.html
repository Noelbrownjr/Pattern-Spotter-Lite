<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Spotter Lite</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .theme-toggle:hover {
            transform: rotate(20deg);
            background: rgba(102,126,234,0.1);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.7;
            font-style: italic;
        }

        .input-section {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        body.dark-mode .input-section {
            background: rgba(30,35,60,0.7);
        }

        textarea {
            width: 100%;
            height: 220px;
            border: 2px solid #ddd;
            border-radius: 14px;
            padding: 20px;
            font-size: 16px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        body.dark-mode textarea {
            background: #1a1a2e;
            color: white;
            border-color: #444;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #analyzeBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #analyzeBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        #clearBtn {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        #clearBtn:hover {
            background: rgba(102,126,234,0.1);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeUp 0.4s ease;
        }

        body.dark-mode .card {
            background: rgba(30,35,60,0.8);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-tag {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #667eea;
        }

        .summary {
            grid-column: 1 / -1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @media(max-width: 700px) {
            .results {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 24px;
            }

            textarea {
                height: 180px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <div class="logo">✨ Pattern Spotter Lite</div>

            <button class="theme-toggle" id="themeToggle">
                🌙
            </button>
        </header>

        <div class="subtitle">
            Discover hidden patterns in your writing
        </div>

        <div class="input-section">

            <textarea
                id="textInput"
                placeholder="Paste your journal, thoughts, essay, dreams, conspiracy notes, philosophy, poetry... anything."></textarea>

            <div class="button-group">
                <button id="analyzeBtn">
                    Find Patterns
                </button>

                <button id="clearBtn">
                    Clear
                </button>
            </div>

        </div>

        <div id="resultsContainer">

            <div class="empty-state">
                Paste text above and click <strong>Find Patterns</strong>
            </div>

        </div>

    </div>

    <script>

        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const textInput = document.getElementById('textInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const themeToggle = document.getElementById('themeToggle');

        analyzeBtn.addEventListener('click', analyzeText);
        clearBtn.addEventListener('click', clearAll);
        themeToggle.addEventListener('click', toggleTheme);

        function analyzeText() {

            const text = textInput.value.trim();

            if (!text) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        Please enter some text first.
                    </div>
                `;
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = `
                Analyzing
                <span class="loading"></span>
            `;

            setTimeout(() => {

                const words = text
                    .toLowerCase()
                    .match(/\b[a-z']+\b/g) || [];

                const frequency = {};

                words.forEach(word => {

                    if (word.length > 3) {

                        frequency[word] =
                            (frequency[word] || 0) + 1;
                    }

                });

                const topWords = Object.entries(frequency)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 12);

                const sentences =
                    text.split(/[.!?]+/)
                    .filter(s => s.trim().length > 0);

                const paragraphs =
                    text.split(/\n+/)
                    .filter(p => p.trim().length > 0);

                let tone = "Neutral";

                if (text.includes("!")) {
                    tone = "Energetic";
                }

                if (text.includes("?")) {
                    tone += " & Reflective";
                }

                if (text.length > 1200) {
                    tone += " & Deeply Analytical";
                }

                const averageSentence =
                    Math.round(
                        words.length / Math.max(sentences.length, 1)
                    );

                const repeatedThemes =
                    topWords
                    .slice(0, 3)
                    .map(item => item[0]);

                resultsContainer.innerHTML = `

                    <div class="results">

                        <div class="card">

                            <div class="card-title">
                                COMMON WORDS
                            </div>

                            <div class="word-list">

                                ${topWords.map(([word, count]) => `
                                    <div class="word-tag">
                                        ${word} (${count})
                                    </div>
                                `).join('')}

                            </div>

                        </div>

                        <div class="card">

                            <div class="card-title">
                                TEXT STATS
                            </div>

                            <p><strong>Words:</strong> ${words.length}</p>
                            <p><strong>Sentences:</strong> ${sentences.length}</p>
                            <p><strong>Paragraphs:</strong> ${paragraphs.length}</p>
                            <p><strong>Avg Sentence:</strong> ${averageSentence} words</p>
                            <p><strong>Characters:</strong> ${text.length}</p>

                        </div>

                        <div class="card">

                            <div class="card-title">
                                DETECTED TONE
                            </div>

                            <p>${tone}</p>

                        </div>

                        <div class="card">

                            <div class="card-title">
                                RECURRING THEMES
                            </div>

                            <p>
                                ${repeatedThemes.join(', ')}
                            </p>

                        </div>

                        <div class="card summary">

                            <div class="card-title">
                                PATTERN SUMMARY
                            </div>

                            <p>
                                Your writing repeatedly circles around
                                ideas connected to
                                <strong>${repeatedThemes.join(', ')}</strong>.

                                The pacing suggests a
                                <strong>${tone.toLowerCase()}</strong>
                                communication style.

                                Sentence density averages
                                <strong>${averageSentence} words</strong>,
                                which gives the text a
                                ${averageSentence > 18
                                    ? 'layered and contemplative'
                                    : 'fast and direct'}
                                rhythm.
                            </p>

                        </div>

                    </div>
                `;

                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = `Find Patterns`;

            }, 700);
        }

        function clearAll() {

            textInput.value = '';

            resultsContainer.innerHTML = `
                <div class="empty-state">
                    Paste text above and click
                    <strong>Find Patterns</strong>
                </div>
            `;
        }

        function toggleTheme() {

            document.body.classList.toggle('dark-mode');

            if (
                document.body.classList.contains('dark-mode')
            ) {
                themeToggle.innerHTML = '☀️';
            } else {
                themeToggle.innerHTML = '🌙';
            }
        }

    </script>

</body>
</html>
